services:
  # FastAPI Backend Service
  - type: web
    name: chika-backend
    env: docker
    dockerfilePath: server/Dockerfile
    plan: starter  # Starter plan supports persistent disk storage (uses your credits, ~$7/month)
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: chika-storage
      mountPath: /app/uploads
      sizeGB: 10

  # React Static Frontend
  - type: web
    name: chika-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: chika-backend
          type: web
          property: url
