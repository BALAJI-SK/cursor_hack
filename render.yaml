services:
  # FastAPI Backend Service
  - type: web
    name: AGAM-backend-sk
    env: docker
    dockerfilePath: server/Dockerfile
    dockerContext: server
    plan: starter  # Starter plan supports persistent disk storage (uses your credits, ~$7/month)
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: AGAM-storage
      mountPath: /app/uploads
      sizeGB: 10

  # React Static Frontend
  - type: web
    name: AGAM-frontend-sk
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://AGAM-backend-sk.onrender.com"
